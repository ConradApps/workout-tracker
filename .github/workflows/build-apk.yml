name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install sharp for icon resizing
        run: npm install sharp

      - name: Sync web assets into www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp icon-192.png www/icon-192.png
          cp icon-512.png www/icon-512.png

      - name: Remove existing android folder if present
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets into Capacitor
        run: npx cap copy android

      - name: Generate Android icons from icon-512.png
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = Image.open("icon-512.png").convert("RGBA")

          sizes = {
            "android/app/src/main/res/mipmap-mdpi/ic_launcher.png": 48,
            "android/app/src/main/res/mipmap-hdpi/ic_launcher.png": 72,
            "android/app/src/main/res/mipmap-xhdpi/ic_launcher.png": 96,
            "android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png": 144,
            "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png": 192,
            "android/app/src/main/res/mipmap-mdpi/ic_launcher_round.png": 48,
            "android/app/src/main/res/mipmap-hdpi/ic_launcher_round.png": 72,
            "android/app/src/main/res/mipmap-xhdpi/ic_launcher_round.png": 96,
            "android/app/src/main/res/mipmap-xxhdpi/ic_launcher_round.png": 144,
            "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png": 192,
          }

          for path, size in sizes.items():
            os.makedirs(os.path.dirname(path), exist_ok=True)
            img = src.resize((size, size), Image.LANCZOS)
            # Convert to RGB with white background for non-round
            bg = Image.new("RGBA", (size, size), (255, 255, 255, 255))
            bg.paste(img, mask=img.split()[3])
            bg.convert("RGB").save(path, "PNG")
            print(f"Generated {path} at {size}px")

          PYEOF

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk Lyfts-debug.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lyfts-debug
          path: Lyfts-debug.apk
          retention-days: 30

      - name: Delete existing 'latest' release if it exists
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Lyfts – Latest Build"
          body: |
            ✅ Auto-built from the latest `main` branch commit.

            **To install on your OPPO Find X9:**
            1. Download `Lyfts-debug.apk` below
            2. Open the file on your phone
            3. Tap Install (allow "Install unknown apps" if prompted)
          files: Lyfts-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
