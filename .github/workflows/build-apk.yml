name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Sync web assets into www folder
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp icon-192.png www/icon-192.png
          cp icon-512.png www/icon-512.png

      - name: Remove existing android folder if present
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web assets into Capacitor
        run: npx cap sync android

      - name: Enable edge-to-edge fullscreen (transparent status & nav bars)
        run: |
          # Add app background color resource matching the web app bg (#f2f2f7)
          cat > android/app/src/main/res/values/app_colors.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="appBackground">#f2f2f7</color>
          </resources>
          XML

          python3 << 'PYEOF'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/res/values/styles.xml")
          s = p.read_text()
          inject = """
              <item name="android:statusBarColor">@android:color/transparent</item>
              <item name="android:navigationBarColor">@android:color/transparent</item>
              <item name="android:windowDrawsSystemBarBackgrounds">true</item>
              <item name="android:windowLightStatusBar">true</item>
              <item name="android:windowLightNavigationBar">true</item>
              <item name="android:fitsSystemWindows">false</item>
              <item name="android:windowBackground">@color/appBackground</item>
          """
          s = re.sub(
              r'(<style\s+name="AppTheme\.NoActionBar"[^>]*>)',
              r'\1' + inject,
              s,
              count=1,
          )
          p.write_text(s)
          print(s)
          PYEOF

      - name: Generate Android icons
        run: |
          pip install Pillow --break-system-packages -q
          python3 << 'PYEOF'
          from PIL import Image
          import os

          src = Image.open("icon-512.png").convert("RGBA")

          def make_png(size):
            bg = Image.new("RGBA", (size, size), (255, 255, 255, 255))
            icon = src.resize((size, size), Image.LANCZOS)
            bg.paste(icon, mask=icon.split()[3])
            return bg.convert("RGB")

          sizes = {
            "mipmap-mdpi":    48,
            "mipmap-hdpi":    72,
            "mipmap-xhdpi":   96,
            "mipmap-xxhdpi":  144,
            "mipmap-xxxhdpi": 192,
          }

          base = "android/app/src/main/res"
          for folder, size in sizes.items():
            path = f"{base}/{folder}"
            os.makedirs(path, exist_ok=True)
            img = make_png(size)
            img.save(f"{path}/ic_launcher.png")
            img.save(f"{path}/ic_launcher_round.png")
            img.save(f"{path}/ic_launcher_foreground.png")
            print(f"{folder}: {size}px")
          PYEOF

      - name: Fix adaptive icon XML to use plain launcher
        run: |
          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML

          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/ic_launcher_background.xml << 'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#FFFFFF</color>
          </resources>
          XML

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk Lyfts-debug.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Lyfts-debug
          path: Lyfts-debug.apk
          retention-days: 30

      - name: Delete existing 'latest' release if it exists
        run: |
          gh release delete latest --yes || true
          git push --delete origin latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Lyfts – Latest Build"
          body: |
            Auto-built from the latest `main` branch commit (fullscreen edge-to-edge).

            **Install on Android:**
            1. Download `Lyfts-debug.apk` below
            2. Open the file on your phone
            3. Tap Install (allow "Install unknown apps" if prompted)
          files: Lyfts-debug.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
